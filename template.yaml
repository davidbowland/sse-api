                - 'aws-marketplace:ViewSubscriptions'
                - 'bedrock:Invoke*'
                - 'bedrock:List*'
              Effect: Allow
              Resource: '*'
        # Allow invoking the LLM worker Lambda
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'lambda:InvokeFunction'
              Effect: Allow
              Resource: !GetAtt LlmResponseWorkerFunction.Arn
      Environment:
        Variables:
          DEBUG_LOGGING: 'false'
          DYNAMODB_PROMPT_TABLE_NAME: !Ref PromptTable
          DYNAMODB_SESSION_TABLE_NAME: !Ref SessionTable
          RESPONSE_PROMPT_ID: analysis
          WORKER_FUNCTION_ARN: !GetAtt LlmResponseWorkerFunction.Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/analysis
            Method: post
      Tags:
        'created-by': 'sse-api'
        'created-for': 'sse'
        'environment': !Ref Environment
      Timeout: 10
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-llm-response.ts

  PostAnalysisLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostAnalysisFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'sse-api'
        - Key: 'created-for'
          Value: 'sse'
        - Key: 'environment'
          Value: !Ref Environment

  PostAnalysisGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
