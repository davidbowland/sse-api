AWSTemplateFormatVersion: 2010-09-09
Description: >-
  API for sse project

Transform:
  - AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - test
    Description: Environment for deploy
  SuggestClaimsUrl:
    Type: String
    Description: URL used for sourcing claims

Mappings:
  EnvironmentMap:
    prod:
      certificate: adce1a21-90b4-4120-8548-111215e582f0
      corsDomain: https://sse.dbowland.com
      domain: sse-api.dbowland.com
      logStreamFunction: log-subscriber
      project: sse
      promptTable: sse-api-prompts
      sessionTable: sse-api-sessions
      suggestClaimsTable: sse-api-suggest-claims
      zoneId: Z072422417XWM8PIXXSFA
    test:
      certificate: 6a48cba7-feb9-4de5-8cbf-d383140fcdef
      corsDomain: https://sse.bowland.link
      domain: sse-api.bowland.link
      logStreamFunction: log-subscriber-test
      project: sse-test
      promptTable: sse-api-prompts-test
      sessionTable: sse-api-sessions-test
      suggestClaimsTable: sse-api-suggest-claims-test
      zoneId: Z01312547RGU1BYKIJXY

Resources:
  # API Gateway

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - Authorization
          - Content-Type
          - X-Amz-Date
          - X-Amz-Security-Token
          - X-Api-Key
          - X-Twitch-Token
        AllowMethods:
          - DELETE
          - GET
          - OPTIONS
          - PATCH
          - POST
          - PUT
        AllowOrigins:
          - !FindInMap [EnvironmentMap, !Ref Environment, corsDomain]
      Domain:
        BasePath:
          - /v1
        CertificateArn: !Sub
          - 'arn:aws:acm:${AWS::Region}:${AWS::AccountId}:certificate/${Certificate}'
          - Certificate: !FindInMap [EnvironmentMap, !Ref Environment, certificate]
        DomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
        EndpointConfiguration: REGIONAL
        Route53:
          DistributionDomainName: !FindInMap [EnvironmentMap, !Ref Environment, domain]
          HostedZoneId: !FindInMap [EnvironmentMap, !Ref Environment, zoneId]
      FailOnWarnings: true
      StageName: v1

  # Confidence level

  GetConfidenceLevelFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-confidence-levels.getConfidenceLevelsHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 512
      Description: Retrieve confidence levels
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /confidence-levels
            Method: get
      Tags:
        'created-by': 'sse-api'
        'created-for': 'sse'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-confidence-levels.ts

  GetConfidenceLevelLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetConfidenceLevelFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'sse-api'
        - Key: 'created-for'
          Value: 'sse'
        - Key: 'environment'
          Value: !Ref Environment

  GetConfidenceLevelGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetConfidenceLevelLogGroup

  # Session

  PostChangeConfidenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-change-confidence.postChangeConfidenceHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 512
      Description: Change the confidence of a session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionTable
      Environment:
        Variables:
          DYNAMODB_SESSION_TABLE_NAME: !Ref SessionTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/change-confidence
            Method: post
      Tags:
        'created-by': 'sse-api'
        'created-for': 'sse'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-change-confidence.ts

  PostChangeConfidenceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostChangeConfidenceFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'sse-api'
        - Key: 'created-for'
          Value: 'sse'
        - Key: 'environment'
          Value: !Ref Environment

  PostChangeConfidenceGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostChangeConfidenceLogGroup

  PostSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-session.postSessionHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Create session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionTable
        - DynamoDBReadPolicy:
            TableName: !Ref PromptTable
        # Allow invoking a model in Bedrock
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'aws-marketplace:Subscribe'
                - 'aws-marketplace:ViewSubscriptions'
                - 'bedrock:Invoke*'
                - 'bedrock:List*'
              Effect: Allow
              Resource: '*'
      Environment:
        Variables:
          DYNAMODB_PROMPT_TABLE_NAME: !Ref PromptTable
          DYNAMODB_SESSION_TABLE_NAME: !Ref SessionTable
          ID_MAX_LENGTH: 16
          ID_MIN_LENGTH: 6
          SESSION_EXPIRE_HOURS: 36
          VALIDATE_CLAIM_PROMPT_ID: validate-claim
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions
            Method: post
      Tags:
        'created-by': 'sse-api'
        'created-for': 'sse'
        'environment': !Ref Environment
      Timeout: 35
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/post-session.ts

  PostSessionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${PostSessionFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'sse-api'
        - Key: 'created-for'
          Value: 'sse'
        - Key: 'environment'
          Value: !Ref Environment

  PostSessionGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref PostSessionLogGroup

  GetSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/get-session.getSessionHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Retrieve session
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBReadPolicy:
            TableName: !Ref SessionTable
      Environment:
        Variables:
          DYNAMODB_SESSION_TABLE_NAME: !Ref SessionTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: get
      Tags:
        'created-by': 'sse-api'
        'created-for': 'sse'
        'environment': !Ref Environment
      Timeout: 15
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/get-session.ts

  GetSessionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetSessionFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'sse-api'
        - Key: 'created-for'
          Value: 'sse'
        - Key: 'environment'
          Value: !Ref Environment

  GetSessionGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref GetSessionLogGroup

  # LLM invocation

  LlmResponseWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/llm-response-worker.llmResponseWorkerHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Background worker that executes LLM calls asynchronously
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionTable
        - DynamoDBReadPolicy:
            TableName: !Ref PromptTable
        # Allow invoking a model in Bedrock
        - Version: 2012-10-17
          Statement:
            - Action:
                - 'aws-marketplace:Subscribe'
                - 'aws-marketplace:ViewSubscriptions'
                - 'bedrock:Invoke*'
                - 'bedrock:List*'
              Effect: Allow
              Resource: '*'
      Environment:
        Variables:
          DEBUG_LOGGING: 'false'
          DYNAMODB_PROMPT_TABLE_NAME: !Ref PromptTable
          DYNAMODB_SESSION_TABLE_NAME: !Ref SessionTable
      Tags:
        'created-by': 'sse-api'
        'created-for': 'sse'
        'environment': !Ref Environment
      Timeout: 175
      Tracing: Active
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: 'es2023'
        Sourcemap: true
        EntryPoints:
          - src/handlers/llm-response-worker.ts

  LlmResponseWorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LlmResponseWorkerFunction}
      RetentionInDays: 30
      Tags:
        - Key: 'created-by'
          Value: 'sse-api'
        - Key: 'created-for'
          Value: 'sse'
        - Key: 'environment'
          Value: !Ref Environment

  LlmResponseWorkerGroupSubscription:
    Type: AWS::Logs::SubscriptionFilter
    Properties:
      DestinationArn: !Sub
        - 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${Function}'
        - Function: !FindInMap [EnvironmentMap, !Ref Environment, logStreamFunction]
      FilterPattern: '[timestamp, uuid, level="ERROR", message]'
      LogGroupName: !Ref LlmResponseWorkerLogGroup

  PostAnalysisFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/post-llm-response.postLlmResponseHandler
      Runtime: nodejs22.x
      Architectures:
        - x86_64
      MemorySize: 1536
      Description: Send a message to end chat handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionTable
        - DynamoDBReadPolicy:
